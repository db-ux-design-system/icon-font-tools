---
name: Validate

on:
  workflow_call:

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: 🔄 Init PNPM
        uses: ./.github/actions/pnpm-init

      - name: 🔬 Validate repo
        run: pnpm run lint
