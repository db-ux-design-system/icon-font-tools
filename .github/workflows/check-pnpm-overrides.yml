name: Check pnpm Overrides

on:
    workflow_dispatch: # manual run
    schedule:
        - cron: "0 3 * * 0" # weekly

permissions:
    contents: write # Required to commit changes and create branches
    pull-requests: write # Required to create pull requests

jobs:
    check-overrides:
        runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
        steps:
            - name: Checkout repository
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0 # needed for PR creation

            - name: Install pnpm
              uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

            - name: Setup Node.js
              uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: ".nvmrc"
                  cache: "pnpm"

            - uses: mfranzke/check-pnpm-overrides@5496a3e14acf6077a6c8dd610634ad51246e5c3d # v0.0.3
