---
name: Test

on:
  workflow_call:

jobs:
  validate:
    name: Test
    runs-on: ubuntu-24.04 # Use Ubuntu 24.04 explicitly
    steps:
      - name: ⏬ Checkout repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: ⏬ Install fonttools
        run: |
          pip3 install fonttools brotli
          fonttools --help

      - name: 🔄 Init PNPM
        uses: ./.github/actions/pnpm-init

      - name: 👨‍🔬👩‍🔬 Test repo
        run: pnpm run test
