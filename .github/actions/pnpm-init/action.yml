---
name: "PNPM Init Action"
description: "Initialize PNPM"
runs:
  using: "composite"
  steps:
    - name: 🆙 Setup pnpm
      uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
      with:
        run_install: false

    - name: 🆙 Setup pnpm config
      shell: bash
      run: pnpm config set store-dir .pnpm-store

    - name: ⏬ Install pnpm
      shell: bash
      run: pnpm install
