---
name: "PNPM Init Action"
description: "Initialize PNPM"
runs:
  using: "composite"
  steps:
    - name: 🆙 Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      with:
        run_install: false

    - name: 🆙 Setup pnpm config
      shell: bash
      run: pnpm config set store-dir .pnpm-store

    - name: ⏬ Install pnpm
      shell: bash
      run: pnpm install
